version: "3.9"
services:
  caldr-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: caldr-frontend-prod
    ports:
      - "8082:80"
    restart: unless-stopped
    networks:
      - existing_net
    volumes:
      - /home/administrator/nginx_edit/v2/nginx_fronts/caldr.conf:/etc/nginx/conf.d/default.conf:ro
  caldr-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: caldr-backend-prod
    ports:
      - "5002:8000"
    restart: unless-stopped
    networks:
      - existing_net

networks: 
  existing_net:
    external: true 
    name: caldr-net